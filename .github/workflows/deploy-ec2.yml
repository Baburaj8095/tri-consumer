name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_BACKEND_SERVICE: ${{ secrets.EC2_BACKEND_SERVICE || 'triconsumer' }}
      EC2_BACKEND_DIR: ${{ secrets.EC2_BACKEND_DIR || '/home/ec2-user' }}
      EC2_BACKEND_JAR: ${{ secrets.EC2_BACKEND_JAR || 'backend.jar' }}
      EC2_WEB_ROOT: ${{ secrets.EC2_WEB_ROOT || '/var/www/html' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: mvn -q -DskipTests package

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload build artifacts
        run: |
          ssh -i ~/.ssh/ec2_deploy_key "$EC2_USER@$EC2_HOST" 'rm -rf /tmp/tri-consumer-frontend && mkdir -p /tmp/tri-consumer-frontend'
          scp -i ~/.ssh/ec2_deploy_key backend/target/tri-consumer-api-*.jar "$EC2_USER@$EC2_HOST:/tmp/tri-consumer-api.jar"
          scp -i ~/.ssh/ec2_deploy_key -r frontend/build/. "$EC2_USER@$EC2_HOST:/tmp/tri-consumer-frontend/"

      - name: Activate deployment
        run: |
          ssh -i ~/.ssh/ec2_deploy_key "$EC2_USER@$EC2_HOST" "EC2_BACKEND_SERVICE='$EC2_BACKEND_SERVICE' EC2_BACKEND_DIR='$EC2_BACKEND_DIR' EC2_BACKEND_JAR='$EC2_BACKEND_JAR' EC2_WEB_ROOT='$EC2_WEB_ROOT' bash -s" <<'EOF'
          set -euo pipefail

          sudo mkdir -p "$EC2_BACKEND_DIR" "$EC2_WEB_ROOT"
          sudo install -m 0644 /tmp/tri-consumer-api.jar "$EC2_BACKEND_DIR/$EC2_BACKEND_JAR"

          sudo find "$EC2_WEB_ROOT" -mindepth 1 -maxdepth 1 -exec rm -rf {} \;
          sudo cp -a /tmp/tri-consumer-frontend/. "$EC2_WEB_ROOT/"

          sudo systemctl restart "$EC2_BACKEND_SERVICE"
          sudo nginx -t
          sudo systemctl reload nginx
          EOF

  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android App with EAS
        working-directory: mobile
        run: |
          eas build --platform android --profile preview --non-interactive 2>&1 | tee eas-build.log
          
          # Extract build details URL
          BUILD_URL=$(grep -o -E 'https://expo\.dev/accounts/[^/]+/projects/[^/]+/builds/[a-f0-9-]+' eas-build.log | head -n 1 || true)
          if [ -z "$BUILD_URL" ]; then
            BUILD_URL=$(grep -o -E 'https://expo\.dev/[^\s]+' eas-build.log | head -n 1 || true)
          fi
          
          echo "EAS Build URL: $BUILD_URL"
          
          # Write to Step Summary
          echo "### 📱 Expo Android Build Started/Completed!" >> $GITHUB_STEP_SUMMARY
          if [ -n "$BUILD_URL" ]; then
            echo "- **Expo Build Details URL**: [$BUILD_URL]($BUILD_URL)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Could not parse Expo Build Details URL automatically. Check console logs." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### How to Download the APK:" >> $GITHUB_STEP_SUMMARY
          echo "1. Click on the **Expo Build Details URL** above to go to the Expo Build Dashboard." >> $GITHUB_STEP_SUMMARY
          echo "2. Once the build completes successfully on Expo, click the **Download** button on the Expo Build page to download the \`.apk\` file." >> $GITHUB_STEP_SUMMARY
          echo "3. Alternatively, scan the QR code displayed on the Expo Build page directly on your Android device to install the application." >> $GITHUB_STEP_SUMMARY

