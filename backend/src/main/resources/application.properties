server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/trikonekt_consumer;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.sql.init.mode=${DB_INIT_MODE:always}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.frontend-origins=${FRONTEND_ORIGINS:http://localhost:3000,http://localhost:3001,https://www.trikonekt.com,https://trikonekt.com}
app.django-api-base-url=${DJANGO_API_BASE_URL:https://api.growth.vin/api}
app.external-auth-shared-secret=${EXTERNAL_AUTH_SHARED_SECRET:}
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}
app.otp.max-requests-per-window=${OTP_MAX_REQUESTS_PER_WINDOW:5}
app.otp.window-minutes=${OTP_WINDOW_MINUTES:10}
app.otp.pepper=${OTP_PEPPER:change-me-local-otp-pepper}

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

aquasms.base-url=${AQUASMS_BASE_URL:http://login.aquasms.com/sendSMS}
aquasms.username=${AQUASMS_USERNAME:Joel}
